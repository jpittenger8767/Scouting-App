name: Run Scouting Script
on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install requests openpyxl statbotics pandas
        
      - name: Run pre-scout script
        env:
          TBA_KEY2: ${{ secrets.TBA_KEY2 }}
        run: python pre_scout/generate_scouting_sheet.py

      - name: Run match scout merger
        run: |
          if [ -d "match_results" ] && [ "$(ls -A match_results/*.csv 2>/dev/null)" ]; then
            python docs/merge_scouting.py match_results
          else
            echo "No CSVs found, skipping merge."
          fi
        
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.xlsx
          git commit -m "Auto-update scouting data [skip ci]" || echo "No changes to commit"
          git push origin HEAD