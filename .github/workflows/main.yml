name: Run Scouting Script
on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install requests openpyxl statbotics
        
      - name: Run script
        env:
          TBA_KEY2: ${{ secrets.TBA_KEY2 }}
        run: python pre_scout/generate_scouting_sheet.py

      - name: Copy app to root for Pages
        run: cp match_scout/index.html index.html
        
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.xlsx index.html
          git commit -m "Auto-update scouting data [skip ci]" || echo "No changes to commit"
          git push origin HEAD